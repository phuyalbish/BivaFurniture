{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css"
    />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Lobster"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Monomaniac One"
    />
    <link
      rel="icon"
      type="image/x-icon"
      href="{% static 'images/logo.png' %}"
    />
    <title>{%block title%}{%endblock title%} | BivaFurniture</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <link rel="stylesheet" href="{% static 'css/footerstyle.css' %}" />

    <!-- JS Implementing Plugins -->
    <script src="../../../assets/vendor/gmaps/gmaps.min.js"></script>

    <!-- JS Unify -->
    <script src="../../../assets/js/components/gmap/hs.map.js"></script>

    <!-- JS Plugins Init. -->
    <script>
      // initialization of google map
      function initMap() {
        $.HSCore.components.HSGMap.init(".js-g-map");
      }
    </script>

    <script
      src="//maps.googleapis.com/maps/api/js?key=AIzaSyAtt1z99GtrHZt_IcnK-wryNsQ30A112J0&amp;callback=initMap"
      async=""
      defer=""
    ></script>
  </head>
  <body>
    <div class="maincontent">{%block maincontent%}{%endblock maincontent%}</div>
  </body>
</html>
